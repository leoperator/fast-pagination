<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-8">Latest Products</h1>

        <div id="feed" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>

        <div class="mt-12 flex justify-center">
            <button id="next-btn" class="bg-black text-white px-8 py-3 rounded-md font-medium hover:bg-gray-800 transition-colors disabled:bg-gray-400">
                Load Next Page
            </button>
        </div>
    </div>

    <script>
        let nextCursor = null;
        let serialCount = 1;

        const categoryIcons = {
            'Electronics': `<path d="M4 6h16v10H4zm2 12h12v2H6z" fill="white"/>`,
            'Clothing': `<path d="M20.38 3.46L16 2a8 8 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.47a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.47a2 2 0 00-1.34-2.23z" fill="white"/>`,
            'Home': `<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" fill="none" stroke="white" stroke-width="2"/><polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="white" stroke-width="2"/>`,
            'Toys': `<circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="none" stroke="white" stroke-width="2"/><path d="M4.93 4.93l4.24 4.24M14.83 14.83l4.24 4.24M14.83 9.17l4.24-4.24M4.93 19.07l4.24-4.24" stroke="white" stroke-width="2"/>`,
            'Books': `<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" fill="none" stroke="white" stroke-width="2"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" fill="none" stroke="white" stroke-width="2"/>`
        };

        async function fetchProducts() {
            const btn = document.getElementById('next-btn');
            btn.innerText = "Loading...";
            btn.disabled = true;

            let url = '/api/products?limit=12'; 
            if (nextCursor) {
                url += `&cursor=${nextCursor}`;
            }

            try {
                const response = await fetch(url);
                const result = await response.json();
                const feed = document.getElementById('feed');

                result.data.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow';

                    const idString = String(product.id);
                    const hash = idString.charCodeAt(0) + idString.charCodeAt(idString.length - 1);
                    const hue = hash % 360;

                    const iconPath = categoryIcons[product.category] || `<circle cx="12" cy="12" r="10" fill="white"/>`;

                    const imageUrl = `data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='400' height='300' style='background-color:hsl(${hue}, 50%25, 60%25)'%3E%3Cg transform='translate(6, 6) scale(0.5)'%3E${encodeURIComponent(iconPath)}%3C/g%3E%3C/svg%3E`;

                    card.innerHTML = `
                        <div class="relative pb-[75%]">
                            <img src="${imageUrl}" alt="${product.name}" class="absolute top-0 left-0 w-full h-full object-cover">
                            <div class="absolute top-2 left-2 bg-black text-white text-xs font-bold px-2 py-1 rounded">
                                #${serialCount}
                            </div>
                        </div>
                        <div class="p-4">
                            <p class="text-sm text-gray-500 font-medium uppercase tracking-wider mb-1">${product.category}</p>
                            <h3 class="text-lg font-semibold text-gray-900 mb-2 truncate">${product.name}</h3>
                            <p class="text-xl font-bold text-gray-900">$${product.price}</p>
                        </div>
                    `;
                    feed.appendChild(card);
                    serialCount++; 
                });

                nextCursor = result.next_cursor;

                if (!nextCursor) {
                    btn.innerText = "End of Feed";
                } else {
                    btn.innerText = "Load More";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Error fetching products:", error);
                btn.innerText = "Error loading";
            }
        }

        document.getElementById('next-btn').addEventListener('click', fetchProducts);
        fetchProducts();
    </script>
</body>
</html>
